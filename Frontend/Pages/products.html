<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - PCB Ordering</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">
        PCB <span>Ordering</span>
    </div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="products.html">Каталог</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
    </nav>
    <div class="auth-section" id="authButtons"></div>
</header>

<div class="main" style="flex:1; max-width: 1200px; margin: 0 auto; padding: 2rem; width: 100%;">
    <div class="catalog-header">
        <h1 style="color: #2c5282;">Каталог печатных плат</h1>
        <p style="color: #718096;">Выберите плату для вашего проекта</p>
    </div>

    <div class="filters">
        <div class="filter-section">
            <h3>Количество слоёв</h3>
            <div class="filter-group">
                <button class="filter-btn active" data-type="layers" data-value="all">Все</button>
                <button class="filter-btn" data-type="layers" data-value="1">1 слой</button>
                <button class="filter-btn" data-type="layers" data-value="2">2 слоя</button>
                <button class="filter-btn" data-type="layers" data-value="4">4 слоя</button>
                <button class="filter-btn" data-type="layers" data-value="6">6 слоёв</button>
            </div>
        </div>

        <div class="filter-section">
            <h3>Материал</h3>
            <div class="filter-group">
                <button class="filter-btn" data-type="material" data-value="FR4">FR4</button>
                <button class="filter-btn" data-type="material" data-value="Rogers">Rogers</button>
                <button class="filter-btn" data-type="material" data-value="Aluminum">Aluminum</button>
                <button class="filter-btn" data-type="material" data-value="Polyimide">Polyimide</button>
            </div>
        </div>

        <div class="filter-section">
            <h3>Категория</h3>
            <div class="filter-group" id="categoryFilters">
                <button class="filter-btn active" data-type="category" data-value="all">Все</button>
            </div>
        </div>

        <div class="filter-section">
            <h3>Финишное покрытие</h3>
            <div class="filter-group">
                <button class="filter-btn" data-type="surfaceFinish" data-value="HASL">HASL</button>
                <button class="filter-btn" data-type="surfaceFinish" data-value="ENIG">ENIG (золото)</button>
            </div>
        </div>

        <button id="resetFilters" class="reset-btn">Сбросить фильтры</button>
    </div>

    <div id="productsContainer" class="products-grid">
        <div class="loading">Загрузка товаров...</div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 Практиканты ООО "Асандра"</p>
</footer>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    let allProducts = [];
    let categories = [];
    let activeFilters = {
        layers: 'all',
        material: null,
        category: 'all',
        surfaceFinish: null
    };

    async function loadProducts() {
        const container = document.getElementById("productsContainer");
        try {
            const products = await apiRequest(`${API_BASE_URL}/products`);
            allProducts = products;
            if (allProducts.length === 0) {
                container.innerHTML = '<div class="loading">Товары временно недоступны</div>';
                return;
            }
            renderProducts(allProducts);
        } catch (error) {
            console.error("Ошибка загрузки товаров:", error);
            container.innerHTML = '<div class="loading">Ошибка загрузки товаров</div>';
        }
    }

    async function loadCategories() {
        try {
            const response = await fetch(`${API_BASE_URL}/categories`);
            categories = await response.json();
            const container = document.getElementById("categoryFilters");
            if (!container) return;

            let html = '<button class="filter-btn active" data-type="category" data-value="all">Все</button>';
            categories.forEach(cat => {
                html += `<button class="filter-btn" data-type="category" data-value="${cat.idCategory}">${escapeHtml(cat.name)}</button>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.filter-btn[data-type="category"]').forEach(btn => {
                btn.addEventListener('click', () => updateActiveFilter('category', btn.dataset.value));
            });
        } catch (error) {
            console.error("Ошибка загрузки категорий:", error);
        }
    }

    function renderProducts(products) {
        const container = document.getElementById("productsContainer");

        if (products.length === 0) {
            container.innerHTML = '<div class="loading">Нет товаров, соответствующих фильтру</div>';
            return;
        }

        container.innerHTML = products.map(product => {
            const imageUrl = product.imageUrl ? `${FILES_BASE_URL}${product.imageUrl}` : 'https://via.placeholder.com/300x200/2c5282/white?text=PCB';
            const spec = product.specification || {};

            let specsHtml = '';
            if (spec.layers) specsHtml += `<span class="spec-tag">${spec.layers} слоя</span>`;
            if (spec.material) specsHtml += `<span class="spec-tag">${spec.material}</span>`;
            if (spec.surfaceFinish) specsHtml += `<span class="spec-tag">${spec.surfaceFinish}</span>`;

            return `
                <div class="product-card" onclick="window.location.href='product-details.html?id=${product.idProduct}'">
                    <div class="product-image" style="background-image: url('${encodeURI(imageUrl)}');"></div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.name) || 'Печатная плата'}</div>
                        <div class="product-description">${escapeHtml(product.description) || 'Качественная печатная плата для ваших проектов'}</div>
                        <div class="product-specs" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;">
                            ${specsHtml}
                        </div>
                        <div class="product-price">${(product.price || 0).toLocaleString('ru-RU')} ₽</div>
                        <button class="btn-details" onclick="event.stopPropagation(); window.location.href='product-details.html?id=${product.idProduct}'">Подробнее</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function applyFilters() {
        let filtered = [...allProducts];

        if (activeFilters.layers !== 'all') {
            filtered = filtered.filter(p => p.specification?.layers === parseInt(activeFilters.layers));
        }

        if (activeFilters.material) {
            filtered = filtered.filter(p => p.specification?.material === activeFilters.material);
        }

        if (activeFilters.category !== 'all') {
            filtered = filtered.filter(p => p.idCategory === parseInt(activeFilters.category));
        }

        if (activeFilters.surfaceFinish) {
            filtered = filtered.filter(p => p.specification?.surfaceFinish === activeFilters.surfaceFinish);
        }

        renderProducts(filtered);
    }

    function updateActiveFilter(type, value) {
        if (value === 'all' && (type === 'layers' || type === 'category')) {
            activeFilters[type] = 'all';
        } else {
            activeFilters[type] = value;
        }

        document.querySelectorAll(`.filter-btn[data-type="${type}"]`).forEach(btn => {
            if (btn.dataset.value === value || (type === 'layers' && btn.dataset.value === value)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        applyFilters();
    }

    function resetFilters() {
        activeFilters = {
            layers: 'all',
            material: null,
            category: 'all',
            surfaceFinish: null
        };

        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

        const allLayersBtn = document.querySelector('.filter-btn[data-type="layers"][data-value="all"]');
        if (allLayersBtn) allLayersBtn.classList.add('active');

        const allCategoryBtn = document.querySelector('.filter-btn[data-type="category"][data-value="all"]');
        if (allCategoryBtn) allCategoryBtn.classList.add('active');

        applyFilters();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.querySelectorAll('.filter-btn[data-type="layers"]').forEach(btn => {
        btn.addEventListener('click', () => updateActiveFilter('layers', btn.dataset.value));
    });

    document.querySelectorAll('.filter-btn[data-type="material"]').forEach(btn => {
        btn.addEventListener('click', () => updateActiveFilter('material', btn.dataset.value));
    });

    document.querySelectorAll('.filter-btn[data-type="surfaceFinish"]').forEach(btn => {
        btn.addEventListener('click', () => updateActiveFilter('surfaceFinish', btn.dataset.value));
    });

    document.getElementById('resetFilters')?.addEventListener('click', resetFilters);

    document.addEventListener('DOMContentLoaded', async () => {
        checkAuth();
        await loadCategories();
        await loadProducts();
    });
</script>

</body>
</html>
