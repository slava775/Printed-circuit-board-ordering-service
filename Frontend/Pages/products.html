<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог - PCB Ordering</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .product-card {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            padding: 20px 0 0 0 ;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .product-image {
            height: 200px;
            width: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #2c5282;
            display: block;
        }
        .product-info {
            padding: 1.25rem;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c5282;
            margin-bottom: 0.5rem;
        }
        .product-description {
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c5282;
            margin-bottom: 0.5rem;
        }
        .btn-details {
            width: 100%;
            padding: 0.6rem;
            background: #2c5282;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
        }
        .btn-details:hover {
            background: #1e3a5f;
        }
        .filters {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }
        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #2c5282;
            border-color: #2c5282;
            color: white;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: #718096;
            font-size: 1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo" onclick="window.location.href='index.html'">
        PCB <span>Ordering</span>
    </div>
    <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="products.html">Каталог</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
    </nav>
    <div class="auth-section" id="authButtons"></div>
</header>

<div class="main" style="flex:1; max-width: 1200px; margin: 0 auto; padding: 2rem; width: 100%;">
    <div class="catalog-header">
        <h1 style="color: #2c5282;">Каталог печатных плат</h1>
        <p style="color: #718096;">Выберите плату для вашего проекта</p>
    </div>

    <div class="filters">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="1">1 слой</button>
            <button class="filter-btn" data-filter="2">2 слоя</button>
            <button class="filter-btn" data-filter="4">4 слоя</button>
            <button class="filter-btn" data-filter="6">6 слоёв</button>
        </div>
    </div>

    <div id="productsContainer" class="products-grid">
        <div class="loading">Загрузка товаров...</div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 Практиканты ООО "Асандра"</p>
</footer>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
    let allProducts = [];

    async function loadProducts() {
        const container = document.getElementById("productsContainer");
        try {
            const products = await apiRequest(`${API_BASE_URL}/products`);
            allProducts = products;
            if (allProducts.length === 0) {
                container.innerHTML = '<div class="loading">Товары временно недоступны</div>';
                return;
            }
            renderProducts(allProducts);
        } catch (error) {
            container.innerHTML = '<div class="loading">Ошибка загрузки товаров</div>';
        }
    }

    function renderProducts(products) {
        const container = document.getElementById("productsContainer");

        if (products.length === 0) {
            container.innerHTML = '<div class="loading">Нет товаров, соответствующих фильтру</div>';
            return;
        }

        container.innerHTML = products.map(product => {
            const imageUrl = product.imageUrl ? `${FILES_BASE_URL}${product.imageUrl}` : 'https://via.placeholder.com/300x200/2c5282/white?text=PCB';

            return `
                <div class="product-card" onclick="window.location.href='product-details.html?id=${product.idProduct}'">
                    <div class="product-image" style="background-image: url('${encodeURI(imageUrl)}');"></div>
                    <div class="product-info">
                        <div class="product-title">${product.name || 'Печатная плата'}</div>
                        <div class="product-description">${product.description || 'Качественная печатная плата для ваших проектов'}</div>
                        <div class="product-price">${(product.price || 0).toLocaleString('ru-RU')} ₽</div>
                        <button class="btn-details" onclick="event.stopPropagation(); window.location.href='product-details.html?id=${product.idProduct}'">Подробнее</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterProducts(layers, event) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.target) {
            event.target.classList.add('active');
        }

        if (layers === 'all') {
            renderProducts(allProducts);
        } else {
            const filtered = allProducts.filter(p => {
                const spec = p.specification || {};
                return spec.layers === parseInt(layers);
            });
            renderProducts(filtered);
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterProducts(btn.dataset.filter, e);
        });
    });

    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
        loadProducts();
    });
</script>

</body>
</html>
