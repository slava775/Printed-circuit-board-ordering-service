<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - PCB Ordering</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .order-status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #d1fae5; color: #065f46; }
        .status-delivered { background: #ede9fe; color: #5b21b6; }
        .order-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .order-item:last-child { border-bottom: none; }
        .order-number { font-weight: 600; color: #2c5282; margin-bottom: 0.25rem; }
        .order-details { font-size: 0.9rem; color: #718096; }
        .empty-state { text-align: center; padding: 2rem; color: #718096; }
        .profile-header {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .profile-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
        }
        .profile-section {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .profile-section h3 {
            color: #2c5282;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .profile-info p {
            padding: 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 768px) {
            .profile-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            PCB <span>Ordering</span>
        </div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="products.html">Каталог</a>
            <a href="about.html">О нас</a>
            <a href="contacts.html">Контакты</a>
        </nav>
        <div class="auth-section" id="authButtons"></div>
    </header>

    <div class="main" style="flex:1; max-width: 1000px; margin: 0 auto; padding: 2rem; width: 100%;">
        <div class="profile-header">
            <h1>Личный кабинет</h1>
            <a href="products.html" class="btn-hero-primary" style="width:auto; padding:0.6rem 1.5rem;">Новый заказ</a>
        </div>

        <div class="profile-content">
            <div class="profile-section">
                <h3>Мои данные</h3>
                <div class="profile-info" id="profileInfo">
                    <p><strong>Имя:</strong> <span id="userName">Загрузка...</span></p>
                    <p><strong>Email:</strong> <span id="userEmail">Загрузка...</span></p>
                    <p><strong>Страна:</strong> <span id="userCountry">Загрузка...</span></p>
                </div>
            </div>

            <div class="profile-section">
                <h3>Мои заказы</h3>
                <div id="ordersList">
                    <div class="empty-state">Загрузка заказов...</div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Практиканты ООО "Асандра"</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        async function loadOrders() {
            const token = localStorage.getItem("accessToken");
            const container = document.getElementById("ordersList");

            if (!token) {
                container.innerHTML = '<div class="empty-state">Необходимо войти в систему</div>';
                return;
            }

            try {
                const orders = await apiRequest(`${API_BASE_URL}/orders`);
                
                if (orders.length === 0) {
                    container.innerHTML = '<div class="empty-state">У вас пока нет заказов</div>';
                    return;
                }

                const getStatusClass = (status) => {
                    switch(status) {
                        case 'pending': return 'status-pending';
                        case 'processing': return 'status-processing';
                        case 'shipped': return 'status-shipped';
                        case 'delivered': return 'status-delivered';
                        default: return 'status-pending';
                    }
                };

                const getStatusText = (status) => {
                    switch(status) {
                        case 'pending': return 'Ожидает оплаты';
                        case 'processing': return 'В производстве';
                        case 'shipped': return 'Отправлен';
                        case 'delivered': return 'Доставлен';
                        default: return status || 'Неизвестно';
                    }
                };

                container.innerHTML = orders.map(order => `
                    <div class="order-item">
                        <div class="order-number">${order.orderNumber}</div>
                        <div class="order-details">
                            <div>Товар: ${order.productName || 'Печатная плата'}</div>
                            <div>Количество: ${order.quantity}</div>
                            <div>Сумма: ${(order.totalPrice || 0).toLocaleString('ru-RU')} ₽</div>
                            <div>Дата: ${new Date(order.createdAt).toLocaleDateString('ru-RU')}</div>
                        </div>
                        <span class="order-status ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Ошибка загрузки заказов:", error);
                container.innerHTML = '<div class="empty-state">Не удалось загрузить заказы</div>';
            }
        }

        function checkProfileAuth() {
            const token = localStorage.getItem("accessToken");
            const authDiv = document.getElementById("authButtons");

            if (!token) {
                window.location.href = "../pages/index.html";
                return;
            }

            let userName = "Пользователь";
            let userEmail = "";
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.name) userName = payload.name;
                if (payload.email) userEmail = payload.email;
            } catch (e) {}

            authDiv.innerHTML = `
                <div class="user-info">
                    <span class="user-name" onclick="window.location.href='../pages/home.html'">${userName}</span>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            `;

            document.getElementById("userName").textContent = userName;
            document.getElementById("userEmail").textContent = userEmail;
            document.getElementById("userCountry").textContent = "Россия";
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkProfileAuth();
            loadOrders();
        });
    </script>
</body>
</html>
