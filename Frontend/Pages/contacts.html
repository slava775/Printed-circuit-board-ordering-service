<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - PCB Ordering</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .contacts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .contacts-info {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .contacts-info h2 {
            color: #2c5282;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-icon {
            width: 20px;
            height: 20px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .contact-text {
            color: #4a5568;
        }
        .contact-text a {
            color: #2c5282;
            text-decoration: none;
        }
        .contact-text a:hover {
            text-decoration: underline;
        }
        .contact-text strong {
            color: #2c5282;
            display: block;
            margin-bottom: 0.25rem;
        }
        .map-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            min-height: 400px;
            border: none;
        }
        .working-hours {
            margin-top: 2rem;
            background: #f7fafc;
            padding: 1rem;
            border-radius: 10px;
        }
        .working-hours h3 {
            color: #2c5282;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        .working-hours p {
            color: #4a5568;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .contacts-container {
                grid-template-columns: 1fr;
            }
            .map-container iframe {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'">
            PCB <span>Ordering</span>
        </div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="products.html">Каталог</a>
            <a href="about.html">О нас</a>
            <a href="contacts.html">Контакты</a>
        </nav>
        <div class="auth-section" id="authButtons"></div>
    </header>

    <div class="main" style="flex:1; max-width: 1200px; margin: 0 auto; padding: 2rem; width: 100%;">
        <div class="catalog-header">
            <h1 style="color: #2c5282;">Контакты</h1>
            <p style="color: #718096;">Свяжитесь с нами любым удобным способом</p>
        </div>

        <div class="contacts-container">
            <div class="contacts-info">
                <h2>Свяжитесь с нами</h2>
                
                <div class="contact-item">
                    <div class="contact-icon"></div>
                    <div class="contact-text">
                        <strong>Телефон</strong>
                        <a href="tel:+79115001462">8 911 500 14 62</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="contact-icon"></div>
                    <div class="contact-text">
                        <strong>Email</strong>
                        <a href="mailto:sanson-ultro@mail.ru">sanson-ultro@mail.ru</a>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="contact-icon"></div>
                    <div class="contact-text">
                        <strong>Адрес</strong>
                        <span>г. Вологда, ул. Северная, д. 15</span>
                    </div>
                </div>

                <div class="working-hours">
                    <h3>Режим работы</h3>
                    <p>Пн-Пт: 9:00 - 18:00</p>
                    <p>Сб-Вс: выходной</p>
                </div>
            </div>

            <div class="map-container">
                <iframe 
                    src="https://yandex.ru/map-widget/v1/?ll=39.889582%2C59.215163&z=16&pt=39.889582,59.215163,pm2rdm"
                    allowfullscreen="true"
                    loading="lazy">
                </iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Практиканты ООО "Асандра"</p>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        checkAuth();
    </script>
</body>
</html>
